* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; color: #222; }
h2 { text-align:center; padding:18px 0 6px; font-size:20px; letter-spacing:0.5px; color:#2c3e50; }

.legend { text-align:center; margin-bottom:6px; }
.legend-btn {
  padding:7px 16px; margin:4px; border-radius:20px; display:inline-block;
  font-size:12px; font-weight:700; cursor:pointer; border:2px solid transparent;
  user-select:none; transition:transform .15s,box-shadow .15s;
  box-shadow:0 2px 6px rgba(0,0,0,.10);
}
.legend-btn:hover { transform:scale(1.07); box-shadow:0 4px 12px rgba(0,0,0,.15); }
.legend-btn.active { box-shadow:0 0 0 3px #2c3e50; transform:scale(1.05); }
.btn-anak    { background:#ffcdd2; border-color:#c62828; color:#7b1212; }
.btn-menantu { background:#bbdefb; border-color:#1565c0; color:#0d3c6e; }
.btn-cucu    { background:#fff9c4; border-color:#f9a825; color:#7a5a00; }
.btn-cicit   { background:#c8e6c9; border-color:#2e7d32; color:#1b4a1e; }
.btn-bao     { background:#e1bee7; border-color:#6a1b9a; color:#3e0d5c; }
.btn-janggawareng { background:#e0e0e0; border-color:#757575; color:#333; }
.hint { text-align:center; font-size:11px; color:#999; margin-bottom:8px; }

#gen-panel {
  display:none; position:fixed; top:0; right:0; width:340px; height:100vh;
  background:#fff; box-shadow:-4px 0 24px rgba(0,0,0,.15); z-index:1000;
  flex-direction:column; overflow:hidden;
}
#gen-panel.open { display:flex; }
#panel-header { padding:16px 18px 12px; border-bottom:1px solid #e0e0e0; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
#panel-title { font-size:15px; font-weight:700; color:#2c3e50; }
#panel-count { font-size:12px; color:#888; margin-top:2px; }
#panel-close { cursor:pointer; font-size:20px; color:#888; padding:4px 8px; border-radius:6px; line-height:1; border:none; background:none; }
#panel-close:hover { background:#f0f0f0; color:#333; }
#panel-search { padding:10px 14px; border-bottom:1px solid #e8e8e8; flex-shrink:0; }
#panel-search input { width:100%; padding:7px 12px; border:1px solid #ddd; border-radius:20px; font-size:13px; outline:none; }
#panel-search input:focus { border-color:#888; }
#panel-list { overflow-y:auto; flex:1; padding:8px 0; }
.panel-item { padding:10px 18px; font-size:13px; border-bottom:1px solid #f0f0f0; display:flex; align-items:flex-start; gap:10px; }
.panel-item:hover { background:#f7f9fb; }
.item-num { font-size:11px; color:#bbb; font-weight:600; min-width:24px; padding-top:1px; }
.item-name { font-weight:600; color:#222; line-height:1.4; }
.item-parent { font-size:11px; color:#888; margin-top:2px; font-style:italic; }
.panel-color-bar { width:4px; border-radius:2px; align-self:stretch; min-height:32px; flex-shrink:0; }
#panel-overlay { display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,.18); z-index:999; }
#panel-overlay.open { display:block; }

/* ── ANCESTRY POPUP ── */
#ancestry-overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,.50);
  z-index:3000; align-items:center; justify-content:center;
}
#ancestry-overlay.open { display:flex; }
#ancestry-card {
  background:#fff; border-radius:18px; width:min(440px,94vw);
  box-shadow:0 24px 70px rgba(0,0,0,.30); overflow:hidden;
  animation:popIn .2s ease;
}
@keyframes popIn { from{transform:scale(.86);opacity:0} to{transform:scale(1);opacity:1} }
#ancestry-head {
  padding:20px 22px 16px; display:flex; align-items:flex-start;
  justify-content:space-between; border-bottom:1px solid #eee;
}
#ancestry-name { font-size:18px; font-weight:800; color:#2c3e50; line-height:1.3; }
#ancestry-role-badge {
  display:inline-block; margin-top:5px; padding:3px 12px;
  border-radius:20px; font-size:11px; font-weight:700;
}
#ancestry-close { cursor:pointer; font-size:24px; color:#aaa; border:none; background:none; padding:0 4px; line-height:1; margin-left:10px; flex-shrink:0; }
#ancestry-close:hover { color:#333; }
#ancestry-body { padding:18px 22px 22px; max-height:70vh; overflow-y:auto; }
.ancestry-label { font-size:10px; font-weight:700; color:#aaa; letter-spacing:.8px; text-transform:uppercase; margin-bottom:12px; }
.chain { display:flex; flex-direction:column; }
.chain-step { display:flex; align-items:flex-start; gap:14px; position:relative; }
.chain-step:not(:last-child)::after {
  content:''; position:absolute; left:15px; top:36px;
  width:2px; height:calc(100% - 12px);
  background:linear-gradient(to bottom,#ddd 60%,transparent);
}
.chain-dot {
  width:32px; height:32px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:15px; margin-top:2px; border:2px solid rgba(255,255,255,.8);
  box-shadow:0 2px 8px rgba(0,0,0,.15); z-index:1;
}
.chain-text { padding-bottom:22px; }
.chain-rel { font-size:10px; font-weight:700; color:#aaa; letter-spacing:.4px; text-transform:uppercase; line-height:1; }
.chain-person { font-size:14px; font-weight:700; color:#2c3e50; margin-top:3px; line-height:1.3; }
.chain-step.is-target .chain-dot { width:38px; height:38px; font-size:18px; }
.chain-step.is-target .chain-person { font-size:16px; }

/* Tree */
.container { width:100%; height:82vh; overflow:auto; }
.tree { min-width:max-content; padding:30px 40px 60px; display:inline-block; }
.root         { background:#fff;    border:2px solid #2c3e50; color:#2c3e50; }
.anak         { background:#ffcdd2; border:2px solid #c62828; }

  white-space:nowrap; font-size:12.5px; line-height:1.4;
  box-shadow:0 1px 3px rgba(0,0,0,.12);
  cursor:pointer; transition:transform .12s,box-shadow .12s;

.node:hover { transform:translateY(-2px); box-shadow:0 4px 14px rgba(0,0,0,.20); }
.node.highlighted { outline:3px solid #ff6f00; outline-offset:2px; z-index:5; position:relative; }
.node small { display:block; font-size:10px; color:#555; margin-top:1px; }
.couple { display:inline-flex; align-items:center; gap:0; }
.couple .node:first-child { border-right:none; border-radius:8px 0 0 8px; }
.couple .node:last-child  { border-left:none;  border-radius:0 8px 8px 0; }
.couple-sep { display:inline-flex; align-items:center; background:#888; color:#fff; font-size:11px; padding:0 5px; align-self:stretch; z-index:1; font-weight:bold; }
.tree ul { display:flex; justify-content:center; position:relative; list-style:none; margin:0; padding:0; }
.tree li { display:flex; flex-direction:column; align-items:center; position:relative; padding:0 8px; }
.tree ul.children-wrap { padding-top:28px; }
.li-inner { display:flex; flex-direction:column; align-items:center; }
.stem { width:2px; background:#888; height:22px; flex-shrink:0; }
.multi-children-outer { position:relative; display:flex; flex-direction:column; align-items:center; }
.multi-h-line { height:2px; background:#888; position:absolute; top:0; pointer-events:none; }

/* ── Ancestry Map ── */
// nodeMap: nodeName -> { depth, ancestors: [{fullName, depth}], isSpouse, spouseOf }
// For each node with "+" we also register the spouse separately
const nodeMap = new Map();
const ROLE_LABELS  = ["Akar","Anak","Cucu","Cicit","Bao","Janggawareng","Udeg-udeg"];
const ROLE_EMOJI   = ["🌳","🔴","🟡","🟢","🟣","⚪","⚪"];
const ROLE_BG      = ["#fff","#ffcdd2","#fff9c4","#c8e6c9","#e1bee7","#e0e0e0","#e0e0e0"];
const ROLE_FG      = ["#2c3e50","#c62828","#d4a000","#2e7d32","#6a1b9a","#757575","#757575"];
// relation labels from the PERSON's perspective (how they relate to ancestor above)
const CHILD_OF = ["","Anak dari","Anak dari","Anak dari","Anak dari","Anak dari","Anak dari"];
// generation label as seen from root
const GEN_LABEL = ["Akar","Anak","Cucu","Cicit","Bao","Janggawareng","Udeg-udeg"];

function firstName(n){ const p=n.indexOf("+"); return p!==-1?n.slice(0,p).trim():n.trim(); }
function spouseName(n){ const p=n.indexOf("+"); return p!==-1?n.slice(p+1).trim():null; }

function walkData(node, depth, ancestors){
  // ancestors = [{fullName, depth}, ...] — each item is the FULL couple name of that generation
  const selfFull = node.name; // e.g. "Kayim + Ecih"

  // register the whole node (used when clicking the left/main person)
  nodeMap.set(selfFull, { depth, ancestors:[...ancestors], isSpouse:false });

  // also register the spouse (right side of "+") separately
  const sp = spouseName(selfFull);
  if(sp){
    // spouse is "Menantu" — same depth, same ancestors, but flagged
    nodeMap.set("__spouse__"+selfFull, { depth, ancestors:[...ancestors], isSpouse:true, spouseOf:selfFull });
  }

  // children inherit ancestors including this node's full name
  const nextAnc = [...ancestors, {fullName:selfFull, depth}];
  if(node.multiSpouse){
    node.multiSpouse.forEach(s=>s.children.forEach(c=>walkData(c,depth+1,nextAnc)));
  } else if(node.children){
    node.children.forEach(c=>walkData(c,depth+1,nextAnc));
  }
}
walkData(data,0,[]);

/* ── Collect for side panel ── */
const genData={anak:[],menantu:[],cucu:[],cicit:[],bao:[],janggawareng:[]};
const roleMap2={1:"anak",2:"cucu",3:"cicit",4:"bao",5:"janggawareng"};
function collectMembers(node,depth,parentName){
  if(node.multiSpouse){
    const role=roleMap2[depth];
    if(role) genData[role].push({name:firstName(node.name),parent:parentName});
    node.multiSpouse.forEach(s=>{
      genData.menantu.push({name:s.spouse+" ("+s.spouseLabel+")",parent:"Pasangan "+firstName(node.name)});
      s.children.forEach(c=>collectMembers(c,depth+1,firstName(node.name)));
    });
    return;
  }
  if(depth===0){if(node.children)node.children.forEach(c=>collectMembers(c,1,firstName(node.name)));return;}
  const plus=node.name.indexOf("+");
  const selfN=plus!==-1?node.name.slice(0,plus).trim():node.name.trim();
  const spouseN=plus!==-1?node.name.slice(plus+1).trim():"";
  const role=roleMap2[depth];
  if(role) genData[role].push({name:selfN,parent:parentName});
  if(spouseN) genData.menantu.push({name:spouseN,parent:"Pasangan "+selfN});
  if(node.children) node.children.forEach(c=>collectMembers(c,depth+1,selfN));
}
collectMembers(data,0,"");

/* ── Side panel ── */
const roleCfg={
  anak:{label:"🔴 Daftar Anak",color:"#c62828",bg:"#ffcdd2"},
  menantu:{label:"🔵 Daftar Menantu",color:"#1565c0",bg:"#bbdefb"},
  cucu:{label:"🟡 Daftar Cucu",color:"#f9a825",bg:"#fff9c4"},
  cicit:{label:"🟢 Daftar Cicit",color:"#2e7d32",bg:"#c8e6c9"},
  bao:{label:"🟣 Daftar Bao",color:"#6a1b9a",bg:"#e1bee7"},
  janggawareng:{label:"⚪ Daftar Janggawareng",color:"#757575",bg:"#e0e0e0"},
};
let curRole=null;
function openPanel(role){
  curRole=role; const cfg=roleCfg[role], items=genData[role];
  document.getElementById("panel-title").textContent=cfg.label;
  document.getElementById("panel-count").textContent=items.length+" orang";
  document.getElementById("search-input").value="";
  renderList(items,cfg);
  document.getElementById("gen-panel").classList.add("open");
  document.getElementById("panel-overlay").classList.add("open");
  document.querySelectorAll(".legend-btn").forEach(b=>b.classList.remove("active"));
  document.querySelector('.legend-btn[data-role="'+role+'"]').classList.add("active");
}
function closePanel(){
  document.getElementById("gen-panel").classList.remove("open");
  document.getElementById("panel-overlay").classList.remove("open");
  document.querySelectorAll(".legend-btn").forEach(b=>b.classList.remove("active"));
  curRole=null;
}
function renderList(items,cfg){
  const list=document.getElementById("panel-list"); list.innerHTML="";
  if(!items.length){list.innerHTML='<div style="padding:24px;text-align:center;color:#aaa;font-size:13px;">Tidak ada data</div>';return;}
  items.forEach((item,i)=>{
    const div=document.createElement("div"); div.className="panel-item";
    div.innerHTML='<div class="panel-color-bar" style="background:'+cfg.color+';"></div><div><div class="item-num">'+(i+1)+'</div></div><div><div class="item-name">'+item.name+'</div>'+(item.parent?'<div class="item-parent">↳ '+item.parent+'</div>':'')+'</div>';
    list.appendChild(div);
  });
}
document.getElementById("search-input").addEventListener("input",function(){
  if(!curRole)return;
  const q=this.value.toLowerCase(),cfg=roleCfg[curRole];
  const filtered=genData[curRole].filter(i=>i.name.toLowerCase().includes(q)||(i.parent&&i.parent.toLowerCase().includes(q)));
  document.getElementById("panel-count").textContent=filtered.length+" orang";
  renderList(filtered,cfg);
});
document.getElementById("panel-close").addEventListener("click",closePanel);
document.getElementById("panel-overlay").addEventListener("click",closePanel);
document.querySelectorAll(".legend-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{const role=btn.dataset.role;if(curRole===role){closePanel();return;}openPanel(role);});
});

/* ── Ancestry Popup ── */
// key: for main person use node.name; for spouse use "__spouse__"+node.name
function openAncestry(key){
  const entry=nodeMap.get(key); if(!entry)return;
  const {depth,ancestors,isSpouse,spouseOf}=entry;

  // Who is being shown?
  let displayName, isMenuantu=false;
  if(isSpouse){
    displayName = spouseName(spouseOf) || key.replace("__spouse__","");
    isMenuantu = true;
  } else {
    displayName = firstName(key);
  }

  // ── Determine display role ──
  // For menantu: label = "Menantu"
  // For others: label = GEN_LABEL[depth]
  const dispDepth = Math.min(depth,6);
  const roleLabelText = isMenuantu ? "Menantu" : GEN_LABEL[dispDepth];
  const badgeBg = isMenuantu?"#bbdefb":ROLE_BG[dispDepth];
  const badgeFg = isMenuantu?"#1565c0":ROLE_FG[dispDepth];

  // Header
  document.getElementById("ancestry-name").textContent = displayName;
  const badge = document.getElementById("ancestry-role-badge");
  badge.textContent = roleLabelText;
  badge.style.cssText = "background:"+badgeBg+";color:"+badgeFg+";border:1.5px solid "+badgeFg+";";

  const chain = document.getElementById("ancestry-chain"); chain.innerHTML="";

  // ── Build full chain: ancestors + self ──
  // ancestors = [{fullName, depth}, ...] starting from root (depth=0)
  // We want each row to show:
  //   [dot + name]
  //   [small label below = "Anak/Cucu/Cicit/Bao dari <parent above>"]
  //
  // Layout (top to bottom):
  //   Eyang Buhari + Sawirah       ← no label above (it's the root)
  //     └ Anak dari Eyang...
  //   Nasuhi + Runti
  //     └ Cucu dari Nasuhi...
  //   Rusniah + Oding
  //     └ Cucu dari Rusniah...   ← Nani is CUCU (depth 2), same as Rusniah is depth 1
  //   👤 Nani Suryani

  // Build the full list of steps: all ancestors + self
  // Each step: { fullName, depth, isTarget, isMenuantu }
  const steps = [];
  ancestors.forEach(a => steps.push({fullName:a.fullName, depth:a.depth, isTarget:false, isMt:false}));

  // self
  if(isMenuantu){
    // menantu shares same depth & parent as main person
    // fullName for display = just their own name
    steps.push({fullName:displayName, depth:depth, isTarget:true, isMt:true});
  } else {
    steps.push({fullName:displayName, depth:depth, isTarget:true, isMt:false});
  }

  // selfDepth = depth of the person clicked (or their spouse's node)
  const selfDepth = depth;
  // REL_FROM_SELF[dist]: how to describe an ancestor that is `dist` levels above self
  // dist=1 → self is their child ("Anak dari")
  // dist=2 → self is their grandchild ("Cucu dari")
  const REL_FROM_SELF = ["","Anak dari","Cucu dari","Cicit dari","Bao dari","Janggawareng dari","Udeg-udeg dari"];

  steps.forEach((step, i)=>{
    const d = Math.min(step.depth,6);
    const isMt = step.isMt;
    const bg = isMt?"#bbdefb":ROLE_BG[d];
    const fg = isMt?"#1565c0":ROLE_FG[d];
    const emoji = isMt?"🔵":ROLE_EMOJI[d];

    // Label = how the CLICKED PERSON relates to this ancestor row
    // dist = selfDepth - step.depth  (how many levels above self is this ancestor)
    const dist = selfDepth - step.depth;
    let labelAbove = "";
    if(step.isTarget){
      // self row: show their generation label
      if(isMt){
        labelAbove = "Menantu dari " + (i>0?steps[i-1].fullName:"");
      } else if(depth===0){
        labelAbove = "🌳 Eyang / Akar";
      } else {
        labelAbove = GEN_LABEL[d] + " dari " + (i>0?steps[i-1].fullName:"");
      }
    } else if(dist===0){
      labelAbove = "🌳 Eyang / Akar";
    } else {
      // ancestor row: label = "Anak/Cucu/Cicit dari <ancestor above this one>"
      const rel = REL_FROM_SELF[Math.min(dist,6)] || "Keturunan dari";
      labelAbove = rel + " " + (i>0?steps[i-1].fullName:"");
    }

    const div = document.createElement("div");
    div.className = "chain-step" + (step.isTarget?" is-target":"");

    const dotSize = step.isTarget?"width:38px;height:38px;font-size:18px;":"";
    const nameStyle = step.isTarget?"font-size:16px;color:"+fg+";":"";
    const labelStyle = step.isTarget?"color:"+fg+";":"";

    div.innerHTML=
      '<div class="chain-dot" style="background:'+bg+';color:'+fg+';'+dotSize+'">'+emoji+'</div>'+
      '<div class="chain-text">'+
        '<div class="chain-rel" style="'+labelStyle+'">'+labelAbove+'</div>'+
        '<div class="chain-person" style="'+nameStyle+'">'+(step.isTarget?'👤 ':'')+step.fullName+'</div>'+
      '</div>';
    chain.appendChild(div);
  });

  document.getElementById("ancestry-overlay").classList.add("open");
}

function closeAncestry(){
  document.getElementById("ancestry-overlay").classList.remove("open");
  document.querySelectorAll(".node.highlighted").forEach(n=>n.classList.remove("highlighted"));
}
document.getElementById("ancestry-close").addEventListener("click",closeAncestry);
document.getElementById("ancestry-overlay").addEventListener("click",function(e){
  if(e.target===this)closeAncestry();
});

/* ── Build Tree ── */
function splitCouple(name){
  if(!name.includes("+"))return null;
  const parts=name.split("+");
  return{left:parts[0].trim(),right:parts.slice(1).join("+").trim()};
}
function getLabel(d){return["","Anak","Cucu","Cicit","Bao","Janggawareng","Udeg-udeg"][d]||"Turunan";}
function getRole(d){return["root","anak","cucu","cicit","bao","janggawareng","janggawareng"][Math.min(d,6)];}

function attachClick(el,key){
  el.addEventListener("click",function(e){
    e.stopPropagation();
    document.querySelectorAll(".node.highlighted").forEach(n=>n.classList.remove("highlighted"));
    el.classList.add("highlighted");
    openAncestry(key);
  });
}

function makeNodeEl(node,depth){
  const split=depth===0?null:splitCouple(node.name);
  const role=getRole(depth),label=getLabel(depth);
  if(split){
    const w=document.createElement("div");w.className="couple";
    const l=document.createElement("div");l.className="node "+role;l.innerHTML="<div>"+split.left+"</div><small>"+label+"</small>";
    const s=document.createElement("div");s.className="couple-sep";s.textContent="+";
    const r=document.createElement("div");r.className="node menantu";r.innerHTML="<div>"+split.right+"</div><small>Menantu</small>";
    // left = main person (e.g. Kayim), right = spouse (e.g. Ecih)
    attachClick(l, node.name);                   // main person key
    attachClick(r, "__spouse__"+node.name);       // spouse key
    w.appendChild(l);w.appendChild(s);w.appendChild(r);return w;
  }
  const d2=document.createElement("div");d2.className="node "+role;
  d2.innerHTML="<div>"+node.name+"</div>"+(label?"<small>"+label+"</small>":"");
  attachClick(d2,node.name);
  return d2;
}

function buildTree(node,depth){
  const li=document.createElement("li");
  const inner=document.createElement("div");inner.className="li-inner";

  if(node.multiSpouse){
    const role=getRole(depth),label=getLabel(depth);
    const row=document.createElement("div");row.style.cssText="display:inline-flex;align-items:center;gap:0;";
    const sp1=document.createElement("div");sp1.className="node menantu";sp1.style.cssText="border-radius:8px 0 0 8px;border-right:none;";
    sp1.innerHTML="<div>"+node.multiSpouse[0].spouse+"</div><small>"+node.multiSpouse[0].spouseLabel+"</small>";
    const s1=document.createElement("div");s1.className="couple-sep";s1.textContent="+";
    const cn=document.createElement("div");cn.className="node "+role;cn.style.cssText="border-radius:0;border-left:none;border-right:none;";
    cn.innerHTML="<div>"+node.name+"</div>"+(label?"<small>"+label+"</small>":"");
    attachClick(cn,node.name);
    const s2=document.createElement("div");s2.className="couple-sep";s2.textContent="+";
    const sp2=document.createElement("div");sp2.className="node menantu";sp2.style.cssText="border-radius:0 8px 8px 0;border-left:none;";
    sp2.innerHTML="<div>"+node.multiSpouse[1].spouse+"</div><small>"+node.multiSpouse[1].spouseLabel+"</small>";
    row.appendChild(sp1);row.appendChild(s1);row.appendChild(cn);row.appendChild(s2);row.appendChild(sp2);
    inner.appendChild(row);
    const ms=document.createElement("div");ms.className="stem";inner.appendChild(ms);
    const ow=document.createElement("div");ow.className="multi-children-outer";
    const hl=document.createElement("div");hl.className="multi-h-line";ow.appendChild(hl);
    const cw=document.createElement("div");cw.className="spouse-columns-wrap";
    node.multiSpouse.forEach((s,i)=>{
      if(i===1){const dv=document.createElement("div");dv.className="spouse-divider";cw.appendChild(dv);}
      const col=document.createElement("div");col.className="spouse-col";
      const cs=document.createElement("div");cs.className="col-stem";col.appendChild(cs);
      const lb=document.createElement("div");lb.className="col-label";lb.textContent="Anak dari "+s.spouseLabel;col.appendChild(lb);
      const ul=document.createElement("ul");ul.className="children-wrap";
      if(s.children.length===1)ul.classList.add("single-child");
      s.children.forEach(c=>ul.appendChild(buildTree(c,depth+1)));
      col.appendChild(ul);cw.appendChild(col);
    });
    ow.appendChild(cw);inner.appendChild(ow);
  } else {
    inner.appendChild(makeNodeEl(node,depth));
    if(node.children&&node.children.length>0){
      const st=document.createElement("div");st.className="stem";inner.appendChild(st);
      const ul=document.createElement("ul");ul.className="children-wrap";
      if(node.children.length===1)ul.classList.add("single-child");
      node.children.forEach(c=>ul.appendChild(buildTree(c,depth+1)));
      inner.appendChild(ul);
    }
  }
  li.appendChild(inner);return li;
}

function fixLines(){
  document.querySelectorAll(".children-wrap").forEach(ul=>{
    if(ul.classList.contains("single-child"))return;
    const lis=Array.from(ul.querySelectorAll(":scope > li"));if(lis.length<2)return;
    const ur=ul.getBoundingClientRect();
    const fn=lis[0].querySelector(".node,.couple"),ln=lis[lis.length-1].querySelector(".node,.couple");
    if(!fn||!ln)return;
    const fr=fn.getBoundingClientRect(),lr=ln.getBoundingClientRect();
    const lp=((fr.left+fr.width/2)-ur.left)/ur.width*100,rp=((lr.left+lr.width/2)-ur.left)/ur.width*100;
    const line=document.createElement("div");
    line.style.cssText="position:absolute;top:0;left:"+lp+"%;right:"+(100-rp)+"%;height:2px;background:#888;pointer-events:none;";
    ul.appendChild(line);
    lis.forEach(li=>{
      const n=li.querySelector(".node,.couple");if(!n)return;
      const nr=n.getBoundingClientRect(),c=((nr.left+nr.width/2)-ur.left)/ur.width*100;
      const d=document.createElement("div");
      d.style.cssText="position:absolute;top:0;left:"+c+"%;width:2px;height:28px;background:#888;transform:translateX(-50%);pointer-events:none;";
      ul.appendChild(d);
    });
  });
  document.querySelectorAll(".multi-children-outer").forEach(outer=>{
    const hl=outer.querySelector(".multi-h-line"),cols=outer.querySelectorAll(".spouse-col");
    if(cols.length<2||!hl)return;
    const or=outer.getBoundingClientRect();
    const centers=Array.from(cols).map(c=>{const r=c.getBoundingClientRect();return r.left+r.width/2-or.left;});
    hl.style.cssText="position:absolute;top:0;left:"+Math.min(...centers)+"px;width:"+(Math.max(...centers)-Math.min(...centers))+"px;height:2px;background:#888;pointer-events:none;";
  });
}

const rootUl=document.createElement("ul");
rootUl.appendChild(buildTree(data,0));
document.getElementById("tree").appendChild(rootUl);
requestAnimationFrame(()=>requestAnimationFrame(fixLines));
const sty=document.createElement("style");
sty.textContent=".children-wrap{position:relative;}.children-wrap::before{display:none!important;}.children-wrap>li::before{display:none!important;}.multi-children-outer{position:relative;}";
document.head.appendChild(sty);
</script>
