<!DOCTYPE html>
<html>
<head>
<title>Family Tree Lengkap</title>

<style>
body { font-family: Arial; margin:0; background:#f4f6f8; }
h2 { text-align:center; }

/* container */
.container {
  width:100%;
  height:90vh;
  overflow:auto;
  cursor:grab;
}

/* tree */
.tree {
  min-width:max-content;
  transform-origin: top left;
  padding:40px;
}

/* layout */
.tree ul {
  display:flex;
  justify-content:flex-start;
  position:relative;
  padding-top:20px;
}

.tree li {
  list-style:none;
  text-align:center;
  position:relative;
  padding:20px 10px 0 10px;
}

/* garis */
.tree li::before, .tree li::after {
  content:'';
  position:absolute;
  top:0;
  right:50%;
  border-top:2px solid #666;
  width:50%;
}

.tree li::after {
  left:50%;
  border-left:2px solid #666;
}

.tree ul ul::before {
  content:'';
  position:absolute;
  top:0;
  left:50%;
  border-left:3px solid #2196f3;
  height:20px;
}

/* node */
.node {
  border:2px solid #2196f3;
  padding:6px 10px;
  border-radius:8px;
  display:inline-block;
  cursor:pointer;
  white-space:nowrap;
  font-size:13px;
}

/* grouping */
.group {
  border:2px dashed #ccc;
  border-radius:10px;
  padding:10px;
}

/* warna per anak */
.color-0 > .node { background:#bbdefb; }
.color-1 > .node { background:#c8e6c9; }
.color-2 > .node { background:#ffe0b2; }
.color-3 > .node { background:#f8bbd0; }
.color-4 > .node { background:#d1c4e9; }
.color-5 > .node { background:#b2dfdb; }
.color-6 > .node { background:#fff9c4; }
.color-7 > .node { background:#ffccbc; }

/* controls */
.controls { text-align:center; margin-bottom:10px; }

button {
  padding:8px 12px;
  margin:5px;
  border:none;
  background:#2196f3;
  color:white;
  border-radius:5px;
}
</style>
</head>

const container=document.getElementById('container');
let isDown=false,startX,scrollLeft;

container.onmousedown=e=>{
isDown=true;
startX=e.pageX-container.offsetLeft;
scrollLeft=container.scrollLeft;
};
container.onmouseup=()=>isDown=false;
container.onmouseleave=()=>isDown=false;
container.onmousemove=e=>{
if(!isDown)return;
const x=e.pageX-container.offsetLeft;
const walk=(x-startX)*2;
container.scrollLeft=scrollLeft-walk;
};

/* render */
function createNode(node,index=0){
const li=document.createElement("li");
li.classList.add("color-"+(index%8));

const div=document.createElement("div");
div.className="node";
div.textContent=node.name;

li.appendChild(div);

if(node.children){
const ul=document.createElement("ul");
ul.className="group";

node.children.forEach((c,i)=>ul.appendChild(createNode(c,i)));

div.onclick=()=>{
ul.style.display = ul.style.display==="none"?"flex":"none";
};

li.appendChild(ul);
}

return li;
}
